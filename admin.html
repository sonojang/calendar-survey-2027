<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>전체 조회 | 2027 달력 조사</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div>
    <h1 data-i18n="adm.title">전체 조회 — 2027 달력 조사</h1>
    <div class="subtitle" data-i18n="adm.subtitle">응답 현황 조회 · 엑셀 다운로드</div>
  </div>
  <nav>
    <a href="index.html" data-i18n="nav.home">← 홈</a>
  </nav>
</header>

<div class="container">

  <!-- 대시보드 -->
  <div id="dashboard">

    <!-- 네트워크 이미지 관리 -->
    <div class="card" id="network-image-admin">
      <h2 style="margin-top:0" data-i18n="adm.netimg_h">📷 네트워크 페이지 이미지 관리</h2>
      <p class="desc" data-i18n="adm.netimg_p">
        해외 주재원 ④번 탭에서 보여줄 <b>현재 달력의 네트워크 페이지 이미지</b>를 업로드합니다.
        매년 조사 전 새 이미지로 교체하세요. 업로드 즉시 사이트에 반영됩니다.
      </p>

      <div class="netimg-grid">
        <!-- 장금 -->
        <div class="netimg-card">
          <div class="netimg-card-head">
            <h3 data-i18n="adm.netimg_jangkum">장금상선 네트워크</h3>
            <span class="netimg-meta" id="netimg-meta-jangkum"></span>
          </div>
          <div class="netimg-preview-wrap">
            <img id="netimg-preview-jangkum" alt="장금상선 네트워크" loading="lazy">
            <div class="netimg-empty" id="netimg-empty-jangkum" data-i18n="adm.netimg_empty">아직 업로드된 이미지가 없습니다</div>
          </div>
          <div class="netimg-actions">
            <label class="btn btn-secondary btn-sm" style="cursor:pointer; margin:0">
              <span data-i18n="adm.netimg_pick">📁 파일 선택</span>
              <input type="file" id="netimg-file-jangkum" accept="image/*" style="display:none">
            </label>
            <span class="netimg-filename" id="netimg-filename-jangkum"></span>
            <button class="btn btn-primary btn-sm" id="netimg-upload-jangkum" disabled data-i18n="adm.netimg_upload">⬆️ 업로드</button>
          </div>
          <div id="netimg-msg-jangkum" class="netimg-msg"></div>
        </div>

        <!-- 흥아 -->
        <div class="netimg-card">
          <div class="netimg-card-head">
            <h3 data-i18n="adm.netimg_heunga">흥아라인 네트워크</h3>
            <span class="netimg-meta" id="netimg-meta-heunga"></span>
          </div>
          <div class="netimg-preview-wrap">
            <img id="netimg-preview-heunga" alt="흥아라인 네트워크" loading="lazy">
            <div class="netimg-empty" id="netimg-empty-heunga" data-i18n="adm.netimg_empty">아직 업로드된 이미지가 없습니다</div>
          </div>
          <div class="netimg-actions">
            <label class="btn btn-secondary btn-sm" style="cursor:pointer; margin:0">
              <span data-i18n="adm.netimg_pick">📁 파일 선택</span>
              <input type="file" id="netimg-file-heunga" accept="image/*" style="display:none">
            </label>
            <span class="netimg-filename" id="netimg-filename-heunga"></span>
            <button class="btn btn-primary btn-sm" id="netimg-upload-heunga" disabled data-i18n="adm.netimg_upload">⬆️ 업로드</button>
          </div>
          <div id="netimg-msg-heunga" class="netimg-msg"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" data-tab="domestic" data-i18n="adm.tab_dom">국내수량</button>
        <button class="tab" data-tab="overseas" data-i18n="adm.tab_ovr">해외수량·배송</button>
        <button class="tab" data-tab="detail" data-i18n="adm.tab_detail">세부포트</button>
        <button class="tab" data-tab="holiday" data-i18n="adm.tab_holiday">해외휴일</button>
        <button class="tab" data-tab="network" data-i18n="adm.tab_network">네트워크 변경</button>
        <button class="tab" data-tab="shipping" data-i18n="adm.tab_ship">배송 상황</button>
        <button class="tab" data-tab="report" data-i18n="adm.tab_report">📊 보고자료</button>
      </div>

      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px">
        <button class="btn btn-success btn-sm" id="refresh-btn" data-i18n="common.refresh">⟳ 새로고침</button>
        <button class="btn btn-primary btn-sm" id="export-xlsx" data-i18n="adm.export_xlsx">📊 전체 엑셀 다운로드 (원본 양식)</button>
        <button class="btn btn-secondary btn-sm" id="export-csv" data-i18n="adm.export_csv">📄 현재 탭 CSV 다운로드</button>
        <button class="btn btn-danger btn-sm" id="network-report-jangkum" data-i18n="adm.report_jangkum">📕 장금 네트워크 변경사항 보고서</button>
        <button class="btn btn-danger btn-sm" id="network-report-heunga" data-i18n="adm.report_heunga">📗 흥아 네트워크 변경사항 보고서</button>
      </div>

      <div id="stats-summary" style="margin-bottom:14px"></div>

      <div class="tab-panel active" id="panel-domestic">
        <div class="table-wrap"><table id="table-domestic"></table></div>
      </div>
      <div class="tab-panel" id="panel-overseas">
        <div class="table-wrap"><table id="table-overseas"></table></div>
      </div>
      <div class="tab-panel" id="panel-detail">
        <div class="table-wrap"><table id="table-detail"></table></div>
      </div>
      <div class="tab-panel" id="panel-holiday">
        <div class="table-wrap"><table id="table-holiday"></table></div>
      </div>
      <div class="tab-panel" id="panel-network">
        <div class="table-wrap"><table id="table-network"></table></div>
      </div>
      <div class="tab-panel" id="panel-shipping">
        <div class="table-wrap"><table id="table-shipping"></table></div>
      </div>
      <div class="tab-panel" id="panel-report">
        <div class="report-toolbar">
          <button class="btn btn-primary btn-sm" id="report-print" data-i18n="adm.report_print">🖨️ 인쇄 / PDF 저장</button>
          <span class="report-hint" data-i18n="adm.report_hint">현재 조사년도 신청 수량과 전년도 신청 수량을 비교합니다.</span>
        </div>
        <div id="report-content"></div>
      </div>
    </div>

  </div>

</div>

<footer class="site-footer" data-i18n="common.copyright">
  © 장금상선, 흥아라인 · 2027년 달력 제작 조사
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/i18n.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
